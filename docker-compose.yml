services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payoutos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed &&
             gunicorn payoutengine.wsgi --bind 0.0.0.0:8000 --workers 3 --access-logfile -"
    environment:
      DEBUG: "True"
      SECRET_KEY: dev-insecure-change-me
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/payoutos
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A payoutengine worker --loglevel=info --concurrency=2
    environment:
      DEBUG: "True"
      SECRET_KEY: dev-insecure-change-me
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/payoutos
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A payoutengine beat --loglevel=info
    environment:
      DEBUG: "True"
      SECRET_KEY: dev-insecure-change-me
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/payoutos
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev -- --host
    environment:
      VITE_API_URL: http://api:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
